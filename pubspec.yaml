name: nailbite_coach_app
description: "NailBite Coach — 90-day nail biting habit breaking app."
publish_to: 'none'

version: 1.0.10+27

environment:
  sdk: '>=3.3.4 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6

  # State management
  flutter_riverpod: ^2.5.0

  # Local database
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Internationalisation / dates
  intl: ^0.19.0

  # Charts
  fl_chart: ^0.66.0

  # SVG support
  flutter_svg: ^2.0.10

  # Camera / gallery
  image_picker: ^1.0.7

  # File system
  path_provider: ^2.1.2

  # Permissions (notifications, camera)
  permission_handler: ^11.3.0

  # Local notifications
  flutter_local_notifications: ^17.0.0

  # Timezones (required by flutter_local_notifications)
  timezone: ^0.9.2

  # UUID generation
  uuid: ^4.3.3

  # HTTP client
  http: ^1.2.0

  # In-app purchases via RevenueCat (8.10.1+ required for Paywalls)
  purchases_flutter: ^8.10.1
  purchases_ui_flutter: ^8.11.0
  mixpanel_flutter: ^2.5.0

  # Attribution & conversion tracking (TikTok Ads via AppsFlyer)
  appsflyer_sdk: ^6.14.2


dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0

  # App icon generator
  flutter_launcher_icons: ^0.13.1

  # Hive code generation
  hive_generator: ^2.0.1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true

  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"